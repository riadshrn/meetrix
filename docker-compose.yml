services:

  # ----------------------------------------------------------------
  # Backend FastAPI + WebSocket
  # ----------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: meetrix-backend
    ports:
      - "8000:8000"
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PYTHONPATH=/app
    volumes:
      - ./exports:/app/exports
      - ./meetrix.db:/app/meetrix.db
      - pretrained_models:/app/pretrained_models
      - huggingface_cache:/root/.cache/huggingface
      # Google Calendar / Tasks (optionnel — décommenter si configuré)
      # - ./client_secret.json:/app/client_secret.json:ro
      # - ./token.json:/app/token.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ----------------------------------------------------------------
  # Frontend Streamlit
  # ----------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: meetrix-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
      - PYTHONPATH=/app
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pretrained_models:
  huggingface_cache:

networks:
  default:
    name: meetrix-network